services:
  - type: web
    name: consultorio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT lawclinic.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        sync: false   # agregar el dominio .onrender.com tras crear el servicio
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # agregar https://<tu-app>.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false   # mismo valor que CORS_ALLOWED_ORIGINS
      - key: DB_NAME
        fromDatabase:
          name: consultorio-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: consultorio-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: consultorio-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: consultorio-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: consultorio-db
          property: port

databases:
  - name: consultorio-db
    databaseName: lawclinic
    user: lawclinic_admin
